<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Ventas</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <h1 class="titulo">Ventas</h1>

    <!-- 🏠 BOTÓN HOME (IGUAL A INVENTARIO) -->
    <a href="/" class="home-link">
        🏠
    </a>

    <div class="contenedor-inventario">

        <!-- HISTORIAL -->
        <div class="tabla-productos">

            <h2>Historial de Ventas</h2>

            <table border="1">

                <tr>
                    <th>Producto</th>
                    <th>Cantidad</th>
                    <th>Fecha</th>
                </tr>

                {% for venta in ventas %}
                <tr>
                    <td>{{ venta.obtener_producto().obtener_nombre() }}</td>
                    <td>{{ venta.obtener_cantidad() }}</td>
                    <td>{{ venta.obtener_fecha().strftime("%d/%m/%Y %H:%M") }}</td>
                </tr>
                {% endfor %}

            </table>

        </div>

        <!-- PANEL DERECHO -->
        <div class="panel-lateral">

            <h2>Registrar Venta</h2>

            {% if error %}
            <p style="color:red;">
                {{ error }}
            </p>
            {% endif %}

            <form method="POST" action="/registrar-venta">

                <label>ID Producto</label>
                <br>

                <input type="number" name="id_producto" required>

                <br><br>

                <label>Cantidad</label>
                <br>

                <input type="number" name="cantidad" required>

                <br><br>

                <button type="submit">
                    Registrar Venta
                </button>

            </form>

        </div>

    </div>

</body>

</html>
