<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Registro</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="home">

    <div style="
        display:flex;
        justify-content:center;
        align-items:center;
        gap:50px;
        margin-top:60px;
    ">

        <!-- FORMULARIO -->
        <div>

            <h1>Crear Cuenta</h1>

            {% if error %}
                <p style="color:red;">
                    {{ error }}
                </p>
            {% endif %}

            <form method="POST">

                <input
                    type="text"
                    name="usuario"
                    placeholder="Usuario"
                    required
                >

                <br><br>

                <input
                    type="password"
                    name="password"
                    placeholder="Contraseña"
                    required
                >

                <br><br>

                <input
                    type="password"
                    name="confirmar_password"
                    placeholder="Confirmar contraseña"
                    required
                >

                <br><br>

                <button type="submit" class="boton">
                    Registrarse
                </button>

            </form>

            <br>

            <a href="/login">
                Volver al Login
            </a>

        </div>

        <!-- REQUISITOS -->
        <div style="
            border: 2px solid #007bff;
            border-radius: 15px;
            padding: 20px;
            width: 280px;
            color: #007bff;
            background: transparent;
        ">

            <h2 style="margin-top:0;">
                🔒 Requisitos
            </h2>

            <ul style="padding-left:20px;">

                <li>Mínimo 8 caracteres</li>

                <br>

                <li>Al menos una letra mayúscula</li>

                <br>

                <li>Al menos una letra minúscula</li>

                <br>

                <li>Al menos un número</li>

                <br>

                <li>Al menos un carácter especial</li>

            </ul>

        </div>

    </div>

</body>

</html>
