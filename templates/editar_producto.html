<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Producto</title>
</head>
<body>

    <h1>Editar Producto</h1>

    <form method="POST" action="/guardar-producto/{{ producto.obtener_id() }}">

        <label>Nombre:</label>
        <input
            type="text"
            name="nombre"
            value="{{ producto.obtener_nombre() }}"
            required
        >

        <br><br>

        <label>Cantidad:</label>
        <input
            type="number"
            name="cantidad"
            value="{{ producto.obtener_cantidad() }}"
            required
        >

        <br><br>

        <button type="submit">
            Guardar Cambios
        </button>

    </form>

    <br>

    <a href="/inventario">Volver</a>

</body>
</html>
